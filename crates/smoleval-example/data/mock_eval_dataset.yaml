name: "Mock Agent Eval Dataset"
description: "Demo evaluation with a mock echo agent"
tests:
  - name: echoGreeting
    prompt: |
      Hello, world!
    checks:
      - kind: responseContainsAll
        values: ["Hello", "world"]
      - kind: responseExactMatch
        value: "Hello World!!!"

  - name: checkToolUsage
    prompt: |
      Do something with tools
    checks:
      - kind: responseContainsAny
        values: ["tools", "something"]
      - kind: toolUsedAtLeast
        name: "echo_tool"

  - name: noHallucination
    prompt: |
      This input doesn't matter
    checks:
      - kind: responseNotContains
        values: ["hallucinated", "made up"]

  - name: customCheck
    prompt: |
      This custom check is constructed properly and will run without errors if registered
    checks:
      - kind: customCheck
        customValue: "custom"

  - name: incorrectCustomCheck
    prompt: |
      This custom check is not properly constructed
    checks:
      - kind: customCheck
        thisIsNotCorrect: "oops"
