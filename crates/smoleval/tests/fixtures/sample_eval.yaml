name: "Echo Agent Eval"
description: "Tests for a simple echo agent"
tests:
  - name: echoBasic
    description: "Agent should echo the input"
    prompt: "Hello, world!"
    checks:
      - type: containsAll
        values: ["Hello", "world"]
      - type: exactMatch
        expected: "Hello, world!"

  - name: echoKeywords
    prompt: "The weather in Paris is sunny"
    checks:
      - type: containsAny
        values: ["Paris", "sunny"]

  - name: echoNoHallucination
    prompt: "Simple response"
    checks:
      - type: notContains
        values: ["hallucinated", "made up"]

  - name: echoWithTools
    prompt: "Use tools"
    checks:
      - type: toolsUsed
        tools: ["echo_tool"]
        strictness: atLeast
