name: "Echo Agent Eval"
description: "Tests for a simple echo agent"
tests:
  - name: echoBasic
    description: "Agent should echo the input"
    prompt: "Hello, world!"
    checks:
      - kind: responseContainsAll
        values: ["Hello", "world"]
      - kind: responseExactMatch
        value: "Hello, world!"

  - name: echoKeywords
    prompt: "The weather in Paris is sunny"
    checks:
      - kind: responseContainsAny
        values: ["Paris", "sunny"]

  - name: echoNoHallucination
    prompt: "Simple response"
    checks:
      - kind: responseNotContains
        values: ["hallucinated", "made up"]

  - name: echoWithTools
    prompt: "Use tools"
    checks:
      - kind: toolsUsed
        tools: ["echo_tool"]
        strictness: atLeast
