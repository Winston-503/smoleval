name: "Weather Agent Eval"
description: "Example evaluation dataset for a weather lookup agent"
tests:
  - name: basicLookup
    description: "Should look up weather for a city"
    prompt: "What's the weather in Paris?"
    checks:
      - type: containsAny
        values: ["Paris", "paris"]
      - type: toolsUsed
        tools: ["get_weather"]
        strictness: atLeast

  - name: multiCityComparison
    description: "Should compare weather in two cities"
    prompt: "Compare the weather in London and Tokyo"
    checks:
      - type: containsAll
        values: ["London", "Tokyo"]
      - type: toolsUsed
        tools: ["get_weather"]
        strictness: atLeast

  - name: refuseImpossible
    description: "Should not hallucinate weather data for Mars"
    prompt: "What's the weather on Mars?"
    checks:
      - type: notContains
        values: ["72 degrees", "sunny skies"]
      - type: containsAny
        values: ["cannot", "don't have", "not available", "Mars"]
